# 跨平台输入法 - 默认配置
# encoding: utf-8

config_version: "1.0.0"

# 全局设置
default:
  schema_list:
    - schema: cross_platform_pinyin
  page_size: 5
  candidate_format: "%c\u2005%@ \u2005"
  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Shift_L: commit_code
      Shift_R: commit_code
      Control_L: noop
      Control_R: noop
  key_binder:
    bindings:
      - { when: composing, accept: Control+a, send: Home }
      - { when: composing, accept: Control+e, send: End }
      - { when: composing, accept: Control+Shift+1, toggle: simplification }
      - { when: composing, accept: Control+Shift+2, toggle: full_shape }
      - { when: composing, accept: Control+Shift+3, toggle: ascii_punct }
      - { when: composing, accept: Control+Shift+4, toggle: cloud_sync }
      - { when: paging, accept: minus, send: Page_Up }
      - { when: has_menu, accept: equal, send: Page_Down }
  menu:
    page_size: 5
  punctuator:
    full_shape:
      " " : { commit: "　" }
      "!" : { commit: "！" }
      "\"" : { pair: ["「", "」"] }
      "#" : { commit: "＃" }
      "$" : { commit: "￥" }
      "%" : { commit: "％" }
      "&" : { commit: "＆" }
      "'" : { pair: ["『", "』"] }
      "(" : { commit: "（" }
      ")" : { commit: "）" }
      "*" : { commit: "＊" }
      "+" : { commit: "＋" }
      "," : { commit: "，" }
      "-" : { commit: "－" }
      "." : { commit: "．" }
      "/" : { commit: "／" }
      ":" : { commit: "：" }
      ";" : { commit: "；" }
      "<" : { commit: "＜" }
      "=" : { commit: "＝" }
      ">" : { commit: "＞" }
      "?" : { commit: "？" }
      "@" : { commit: "＠" }
      "[" : { commit: "【" }
      "\\" : { commit: "＼" }
      "]" : { commit: "】" }
      "^" : { commit: "＾" }
      "_" : { commit: "＿" }
      "`" : { commit: "｀" }
      "{" : { commit: "｛" }
      "|" : { commit: "｜" }
      "}" : { commit: "｝" }
      "~" : { commit: "～" }
    half_shape:
      "," : { commit: "，" }
      "." : { commit: "。" }
      "?" : { commit: "？" }
      "!" : { commit: "！" }
      ":" : { commit: "：" }
      ";" : { commit: "；" }
      "(" : { commit: "（" }
      ")" : { commit: "）" }
      "[" : { commit: "【" }
      "]" : { commit: "】" }

# 云词库设置
cloud_sync:
  enable: false
  server_url: ""
  sync_token: ""
  sync_interval: 300
  enable_encryption: true
  enable_auto_sync: true
  enable_incremental_sync: true

# 安全设置
security:
  enable_audit_logging: true
  enable_data_encryption: true
  enable_sandbox: true
  enable_input_sanitization: true
  enable_rate_limiting: true
  max_input_length: 1024
  encryption_algorithm: "AES-256-GCM"
  audit_log_retention_days: 90