version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clipboard-sync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-clipboard_sync}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: clipboard-sync-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-clipboard_sync_2024}
      DB_NAME: ${DB_NAME:-clipboard_sync}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_string}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
